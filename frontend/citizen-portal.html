<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Citizen Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
    }

    .page-wrapper {
      text-align: center;
    }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 14px;
      color: #555;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: #000; }

    .title {
      font-size: 2rem;
      font-weight: 900;
      color: #111;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 80px;
    }

    /* Card container */
    .container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container .glass {
      position: relative;
      width: 200px;
      height: 230px;
      background: linear-gradient(135deg, #0a3cff, #0026aa);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 40px rgba(10, 60, 255, 0.3);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: 0.5s;
      border-radius: 16px;
      margin: 0 -45px;
      backdrop-filter: blur(10px);
      transform: rotate(calc(var(--r) * 1deg));
      cursor: pointer;
      text-decoration: none;
      gap: 16px;
    }

    .container:hover .glass {
      transform: rotate(0deg);
      margin: 0 20px;
    }

    .container .glass::before {
      content: attr(data-text);
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 0 0 16px 16px;
    }

    .glass-icon {
      font-size: 3rem;
      margin-bottom: 30px;
    }

    /* Button style */
    button {
      padding: 15px 25px;
      border: unset;
      border-radius: 15px;
      color: #212121;
      z-index: 1;
      background: #e8e8e8;
      position: relative;
      font-weight: 1000;
      font-size: 17px;
      box-shadow: 4px 8px 19px -3px rgba(0,0,0,0.27);
      transition: all 250ms;
      overflow: hidden;
      cursor: pointer;
    }

    button::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      height: 100%; width: 0;
      border-radius: 15px;
      background-color: #212121;
      z-index: -1;
      box-shadow: 4px 8px 19px -3px rgba(0,0,0,0.27);
      transition: all 250ms;
    }

    button:hover { color: #e8e8e8; }
    button:hover::before { width: 100%; }

    .footer {
      position: absolute;
      bottom: 20px;
      color: #ccc;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <a class="back-btn" href="index.html">← Back</a>

  <div class="page-wrapper">
    <h1 class="title">Citizen Portal</h1>
    <p class="subtitle">Choose an option to continue</p>

    <div class="container">

      <a class="glass" href="citizen-login.html" data-text="Login" style="--r: -10;">
        <div class="glass-icon">🔐</div>
      </a>

      <a class="glass" href="citizen-register.html" data-text="Register" style="--r: 10;">
        <div class="glass-icon">📝</div>
      </a>

    </div>
  </div>

  <p class="footer">© 2026 Crime Reporting Portal</p>

</body>
</html>
